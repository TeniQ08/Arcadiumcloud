name: Deploy Arcadium

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy on server over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # Server-side script must run `python manage.py migrate` (or equivalent) before
            # restarting Gunicorn so schema changes from this repo are applied on deploy.
            /usr/local/bin/arcadium-deploy.sh